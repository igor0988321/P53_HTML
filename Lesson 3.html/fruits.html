<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            .fruits
            {
                background-color: #f8a5b1;
                padding: 20px;
                width: 400px;
                list-style-position: inside;
            }
            .fruits li
            {
                background-color: #d66d75;
                color: white;
                margin-bottom: 10px;
                padding: 10px;
            }
            .fruits li span
            {
                background-color: #8e354a;
                padding: 5px 10px;
                display: inline-block;
            }
        
        </style>
    </head>
    <body>
       <ol class="fruits">
           <li><span>Apple</span></li>
           <li><span>Orange</span></li>
           <li><span>Pineapple</span></li>
           <li><span>Pear</span></li>
           <li><span>Cherry</span></li>
           
       </ol>
        
        
    </body>
</html>
