<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            table{
                border: 2px solid red;
                /*border-collapse: collapse;*/
                border-spacing: 15px;
                background-color: antiquewhite;
                empty-cells: hide;
                padding: 20px;
            }
            
            th{
                border: 2px solid blue;
                background-color: aqua;
            }
            
            td{
                border: 2px solid green;
                background-color: burlywood;
            }
            
            #td1{
                width: 200px;
                height: 100px;
                text-align: center;
                background-color: aquamarine;
                vertical-align: middle;
            }
        
        </style>
    </head>
    <body>
        
        <table>
            <tr>
                <th>Column 1</th>
                <th>Column 2</th>
                <th>Column 3</th>
                <th>Column 4</th>
            </tr>
            <tr>
                <td>1</td>
                <td id="td1">2</td>
                <td>3</td>
                <td>4</td>
            </tr>
            <tr>
                <td></td>
                <td>2</td>
                <td>3</td>
                <td></td>
            </tr>
        </table>
        
    </body>
</html>
