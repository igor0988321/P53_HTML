<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        
        <style>
             *
            {
                font-family: Segoe UI;
            }
            ul
            {
                list-style-type: none;
                width: 300px;
            }
            
            img
            {
                width: 70px;
                float: left;
            }
            
            p
            {
                text-transform: uppercase;
                font-size: 18px;
                margin: 0;
                padding-top: 20px; 
                margin-left: 80px;
            }
            
            .clear
            {
                clear: both;
            }
            
            li
            {
                background-color: #808080;
                color: white;
                /*padding: 20px;*/
            }
            
            li:hover
            {
                background-color: #5e5e5e;
            }
            
            a
            {
                margin: 0;
                padding: 0;
                text-decoration: none;
                color: white;
            }
            
            .li
            {
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <ul>
            <li>
                <a href="">
                   <div class="li">
                       <img src="img/edit.png" alt="">
                        <p>edit</p>
                        <div class="clear"></div>
                   </div>
                </a>
            </li>
            <li>
                <img src="img/favorites.png" alt="">
                <p>favorites</p>
                
        		<div class="clear"></div>
            </li>
            <li>
                <img src="img/history.png" alt="">
                <p>history</p>
                
        		<div class="clear"></div>
            </li>
            <li>
                <img src="img/security.png" alt="">
                <p>security</p>
        		<div class="clear"></div>
            </li>
            <li>
                <img src="img/settings.png" alt="">
                <p>settings</p>
                <div class="clear"></div>
            </li>
        </ul>
    </body>
</html>
