<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            ul{
                list-style-type: none;
            }
            
            li
            {
                display: inline-block;
            }
            
            img
            {
                width: 80%;
                filter: grayscale();
                opacity: 50%;
            }
            
            img:hover
            {
                filter: grayscale(0);
                opacity: 100%;
            }
        
        </style>
    </head>
    <body>
        <ul>
        	<li><a href=""><img src="img/fb.png" alt=""></a></li>
        	<li><a href=""><img src="img/insta.png" alt=""></a></li>
        	<li><a href=""><img src="img/youtube.png" alt=""></a></li>
        </ul>
        
        
    </body>
</html>
