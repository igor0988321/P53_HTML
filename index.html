        <h1>Mathematical formulas</h1>
        
        <h3>Linear Equations</h3>
        
        <p>A linear equation is any equation that can be written in the form</p>
        
          <p  class="formula 1">ax + b = 0  </p>
        
        <p>where <span class="litera">a</span> and  <span class="litera">b</span> are real numbers and  <span class="litera">x</span> is a variable. This form is sometimes called the standard form of a linear equation. Note that most linear equations will not start off in this form. Also, the variable may or may not be an x so don’t get too locked into always 
            seeing an  <span class="litera">x</span> there.</p>
        
        <h3>Quadratic Equation</h3>
        
        <p>The standard form of a quadratic equation looks like this:</p>
        
            <p class="formula 1">ax<sup>2</sup> + bx + c = 0  </p>
        
         <p>where  <span class="litera">a, b, c</span> are known values and  <span class="litera">x</span> is the variable or unknown (we don't know it yet). Also,  <span class="litera">a</span> can't be 0.</p>
        
        <h3>The area of a circle (A)</h3>
            
        <p><span class="litera"> &#x3C0;</span> (Pi) times the radius ( <span class="litera">r</span>) squared:</p>
        
          <p  class="formula 1" >A = &#x3C0; &#215 r<sup>2 </sup> </p>
        
        <p>or, when you know the diameter ( <span class="litera">D</span>):</p>
          <p  class="formula 1" >A = &#x3C0; / 4) &#215 D<sup>2</sup> </p> 
       
        <p> or, when you know the circumference ( <span class="litera">C</span>):</p>
          <p  class="formula 1" >A = C<sup>2</sup> / 4 &#215 &#x3C0; </p>
        
       <h3> Intersection</h3>
        
        <p>The intersection of two sets  <span class="litera">A</span> and  <span class="litera">B</span>, denoted by A&#8745; B, is the set of all objects that are members of both the sets A and B. In symbols,</p>
        
         <p  class="formula 1"> A &#8745; B = { x : x &#8712; A and x &#8712; B }  </p>
        
        <p>That is, <span class="litera">x</span> is an element of the intersection A &#8745; B if and only if  <span class="litera">x</span> is both an element of  <span class="litera">A</span> and an element of  <span class="litera">B</span>.</p>
