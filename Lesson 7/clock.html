<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            .cont{
                box-sizing: border-box;
                width: 900px;
                margin: auto;
            }
            
            .clock{
                width: 400px;
                height: 400px;
                border: 3px solid #03685a;
                margin: auto;
                border-radius: 50%;
            }
            
            .hour{
                width: 150px;
                height: 2px;
                border: 3px solid #03685a;
                background-color: #03685a;
                margin-left: 200px;
                margin-top: 200px;
                transform-origin: left;
                transform: rotate(-90deg);
                animation: a1 60s linear infinite;
            }
            
             .min{
                width: 180px;
                height: 2px;
                border: 3px solid #03685a;
                background-color: #03685a;
                margin-left: 200px;
                margin-top: -10px;
                transform-origin: left;
                transform: rotate(-90deg);
                animation: a1 5s linear infinite;
            }
            
            .centr{
                width: 15px;
                height: 15px;
                background-color: #03685a;
                border-radius: 50%;
                margin-left: 192px;
                margin-top: -9px;
            }
            
            @keyframes a1{
                from {transform: rotate(-90deg);}
                to{transform: rotate(270deg)}
            }
        
        </style>
    </head>
    <body>
        <div class="cont">
        	<div class="clock">
        	    <div class="hour"></div>
        		<div class="min"></div>
        		<div class="centr"></div>
        	</div>
        </div>
    </body>
</html>
