<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        
        <style>
            *
            {
                font-family: Segoe UI;
            }
            
            .block
            {
                width: 160px;
                border: 1px solid #7d7d7d;
                border-radius: 40px;
                padding: 30px 10px 30px;
                margin: 15px;
                float: left;
            }
            
            p
            {
                text-align: center;
                font-size: 18px;
                font-weight: bold;
                margin: 20px 0 0;
            }
            
            img
            {
                display: block;
                margin: auto;
            }
            
            .clear
            {
                clear: both;
            }
        
        </style>
    </head>
    <body>
        <div class="block">
        	<img src="img/Food_C203-128.png" alt="">
        	<p>Eggs</p>
        </div>
        <div class="block">
        	<img src="img/Food_C205-128.png" alt="">
        	<p>Fish</p>
        </div>
        <div class="block">
        	<img src="img/Food_C217-128.png" alt="">
        	<p>Cheese</p>
        </div>
        <div class="block">
        	<img src="img/Food_C225-128.png" alt="">
        	<p>Beef</p>
        </div>
        <div class="block">
        	<img src="img/Food_C235-128.png" alt="">
        	<p>Coriander</p>
        </div>
        <div class="clear"></div>
        <hr>
    </body>
</html>
