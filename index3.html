<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            *
            {
                background-color: #002b50;
            }
            ul
            {
                list-style-type: none;
                
            }
            li
            {
                list-style-type: none;
            }
            .clear
            {
                clear: both;
            }
            
            .ul
            {
                color: white;
                text-align: center
            }
            .left
            {
                color: white;
                text-align: left
            }
            .center
            {
                color: white;
                text-align: center
            }
            .pit
            {
                
                display: inline-block;
                
            }
            img
            {
                filter: grayscale()
                opacity: 50%;
                width: 60px;
            }
            img:hover
            {
                filter: grayscale(0);
                opacity: 100%;
            }
        
        </style>
    </head>
    <body>
       <div>
             <ul class="left">
                <li>Home</li>
                <li>About</li>
                <li>Gallery</li>
                <li>News</li>
            </ul>
        </div>
        
       <div>
             <ul class="ul">
                <li>Blog</li>
                <li>FAQ</li>
                <li>Contacts</li>
                <li>Privacy Cookies</li>
            </ul>
        </div>
        
        <div> 
            <ul class="pit">
                <li><a href=""><img src="/Lesson4/png/fb.png" alt=""></a></li>
                <li><a href=""><img src="/Lesson4/png/insta.png" alt=""></a></li>
                <li><a href=""><img src="/Lesson4/png/youtube.png" alt=""></a></li>
               
            </ul>
        </div>
        <hr>
        <p class="center">Copyright Company 2018-2019</p>
    </body>
</html>
